<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 1 - Political Spectrum Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .question-card { background: white; padding: 4rem 3rem; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); max-width: 900px; width: 90%; position: relative; text-align: center; }
        .progress-counter { position: absolute; top: 25px; right: 30px; font-weight: 600; color: #95a5a6; font-size: 1.1rem; }
        .question-text { font-size: 2.2rem; font-weight: 700; color: #000000; margin-bottom: 3.5rem; line-height: 1.3; }
        .options-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 3.5rem; }
        input[type="radio"] { display: none; }
        .option-label { display: flex; align-items: center; justify-content: center; height: 80px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s ease; color: #4a4a4a; }
        .option-label:hover { border-color: #d1d1d1; background-color: #fafafa; }
        input:checked + .option-label { background-color: #f5f5dc; border-color: #e5e5c5; color: #5d5d4a; transform: translateY(-2px); }
        .next-btn { background-color: #2d3436; color: white; border: none; padding: 1.2rem 4.5rem; font-size: 1.1rem; font-weight: 600; border-radius: 8px; cursor: pointer; opacity: 0.2; pointer-events: none; }
        .btn-active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>
<div class="question-card">
    <div class="progress-counter">1 / 48</div>
    <div class="question-text">Same sex marriage should be legal.</div>
    <div class="options-container">
        <input type="radio" name="q" id="sd" value="sd" onclick="document.getElementById('nextBtn').classList.add('btn-active')">
        <label for="sd" class="option-label">Strongly Disagree</label>
        <input type="radio" name="q" id="d" value="d" onclick="document.getElementById('nextBtn').classList.add('btn-active')">
        <label for="d" class="option-label">Disagree</label>
        <input type="radio" name="q" id="a" value="a" onclick="document.getElementById('nextBtn').classList.add('btn-active')">
        <label for="a" class="option-label">Agree</label>
        <input type="radio" name="q" id="sa" value="sa" onclick="document.getElementById('nextBtn').classList.add('btn-active')">
        <label for="sa" class="option-label">Strongly Agree</label>
    </div>
    <button class="next-btn" id="nextBtn" onclick="window.location.href='question2.html'">Next Question</button>
</div>
</body>
</html>
