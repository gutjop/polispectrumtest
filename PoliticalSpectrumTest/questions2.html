<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoliSpec Test | 48 Questions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-shadow: 0 10px 40px rgba(0,0,0,0.06);
            --btn-border: #e0e0e0;
            --text-color: #000;
            --accent: #6c5ce7;
            --btn-hover: #fafafa;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .test-container {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            width: 90%;
            max-width: 900px;
            position: relative;
            text-align: center;
            box-sizing: border-box;
        }

        #progress {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #bdc3c7;
            font-size: 1.1rem;
            font-weight: 600;
        }

        #question-text {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 50px;
            color: var(--text-color);
            line-height: 1.2;
        }

        /* Desktop: Horizontal Layout */
        #options-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .option-btn {
            flex: 1;
            min-width: 160px;
            padding: 25px 15px;
            border: 1px solid var(--btn-border);
            border-radius: 12px;
            cursor: pointer;
            background: white;
            font-weight: 600;
            color: #576574;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        /* This new class is ONLY for the abortion question */
        .grid-layout {
            width: 30% !important;
            height: 80px !important;
            flex: none !important;
}

        .option-btn:hover { border-color: #fdf8f1; background: var(--btn-hover); }

        /* Highlight for previous answers */
        .option-btn.selected {
            border-color: var(--text-color);
            background: #FFFFFF;
            color: #0055B7;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .controls { display: flex; justify-content: center; gap: 20px; }

        .btn-nav {
            padding: 15px 50px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-back { background: #dcdde1; color: #2d3436; }
        .btn-next { background: #dcdde1; color: #2d3436; cursor: not-allowed; border: 2px solid #ff3232; }
        .btn-next.active { background: #0055B7; color: #FFFFFF; cursor: pointer; border: 2px solid #000000;}

        /* Review Screen Row Style */
        .review-row {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #eee;
            text-align: left;
            gap: 20px;
        }
        .review-row span { flex: 2; }
        .review-row strong { flex: 1; text-align: right; color: var(--accent); }

        /* --- MOBILE RESPONSIVE STYLES --- */
        @media (max-width: 600px) {
            .test-container {
                width: 100%;
                min-height: 100vh;
                border-radius: 0;
                padding: 80px 20px 40px 20px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            #progress { top: 20px; right: 20px; }

            #question-text {
                font-size: 1.6rem;
                margin-bottom: 30px;
            }

            #options-container {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 30px;
            }

            .option-btn {
                width: 100%;
                min-width: unset;
                padding: 18px;
                font-size: 1.1rem;
            }

            .controls {
                flex-direction: column-reverse;
                width: 100%;
                gap: 10px;
            }

            .btn-nav { width: 100%; padding: 18px; }
        }
    </style>
</head>
<body>

<div class="test-container">
    <div id="quiz-view">
        <div id="progress">1 / 48</div>
        <h2 id="question-text">Loading question...</h2>

        <div id="options-container"></div>

        <div class="controls">
            <button class="btn-nav btn-back" onclick="goBack()">Back</button>
            <button class="btn-nav btn-next" id="next-btn" onclick="goNext()" disabled>Next Question</button>
        </div>
    </div>

</div>

<script src="questions.js"></script>

<script>
    let currentIndex = 0;
    let userAnswers = {}; // Stores q1a, q2a, etc.

    function renderQuestion() {
        const q = questions[currentIndex];
        const qKey = `q${currentIndex + 1}a`; // Set custom variable name

        document.getElementById('question-text').innerText = q.text;
        document.getElementById('progress').innerText = `${currentIndex + 1} / ${questions.length}`;

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;

            if (q.id === 14) {
                btn.classList.add('grid-layout');
            }

            // Back button memory: highlight if already answered
            if (userAnswers[qKey] === opt) {
                btn.classList.add('selected');
            }

            btn.onclick = () => {
                userAnswers[qKey] = opt; // Save the raw answer
                renderQuestion();
            };
            container.appendChild(btn);
        });

        // Toggle Next button state
        const nextBtn = document.getElementById('next-btn');
        if (userAnswers[qKey]) {
            nextBtn.disabled = false;
            nextBtn.classList.add('active');
        } else {
            nextBtn.disabled = true;
            nextBtn.classList.remove('active');
        }
    }

    function goNext() {
        if (currentIndex < questions.length - 1) {
            currentIndex++;
            renderQuestion();
        } else {
            submitFinal();
        }
    }

    function goBack() {
        if (currentIndex === 0) {
            window.location.href = 'index.html';
        } else {
            currentIndex--;
            renderQuestion();
        }
    }

    function submitFinal() {
        localStorage.setItem('poliTestAnswers', JSON.stringify(userAnswers)); // Deploy logic
        window.location.href = 'results.html';
    }

    // Initial load
    window.onload = () => {
        if (typeof questions !== 'undefined') {
            renderQuestion();
        } else {
            document.getElementById('question-text').innerText = "Error: questions.js not found.";
        }
    };
</script>
</body>
</html>
